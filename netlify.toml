# This file configures the build and deployment settings for Netlify.

[build]
  # Vite build: runs tsc then vite build, outputting to dist/
  command = "npm run build"
  
  # Vite outputs to the 'dist' directory by default
  publish = "dist"

[build.environment]
  # Sets the Node.js version to be used during the build process on Netlify.
  NODE_VERSION = "20"
